# Pre-commit hooks. Install once: `pre-commit install --install-hooks`
# Also enable the conventional-commits check on commit messages:
#   pre-commit install --hook-type commit-msg
#
# Run all hooks manually: pre-commit run --all-files
#
# ── Language tracks ───────────────────────────────────────────────────────────
# Uncomment the tracks that match your project's languages.
# Remove tracks entirely for languages you don't use.
# ─────────────────────────────────────────────────────────────────────────────

default_language_version:
  python: python3

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # ── File hygiene — always enabled ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$          # markdown uses trailing spaces for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^\.archon/workflows/.*\.template\.yaml$  # contains {{...}} placeholders, not valid YAML
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Gotchas index — always enabled when docs/gotchas/ exists ───────────────
  - repo: local
    hooks:
      - id: gotchas-index
        name: regenerate docs/gotchas/INDEX.md
        language: system
        entry: bash scripts/gotchas-index.sh
        files: '^docs/gotchas/GOTCHA-.*\.md$'
        pass_filenames: false
        # Stages it back automatically; if it fails the commit aborts.

  # ── Python — ruff (lint + format) ─────────────────────────────────────────
  # Uncomment if your project uses Python.
  #
  # - repo: https://github.com/astral-sh/ruff-pre-commit
  #   rev: v0.7.4
  #   hooks:
  #     - id: ruff
  #       args: [--fix]
  #     - id: ruff-format

  # ── TypeScript / JavaScript / JSON — biome ────────────────────────────────
  # Uncomment if your project uses TypeScript or JavaScript.
  # Requires biome in your package.json devDependencies.
  #
  # - repo: local
  #   hooks:
  #     - id: biome-check
  #       name: biome check
  #       entry: pnpm exec biome check --write --no-errors-on-unmatched
  #       language: system
  #       types_or: [ts, tsx, javascript, jsx, json]
  #       pass_filenames: true

  # ── Rust — cargo fmt ──────────────────────────────────────────────────────
  # Uncomment if your project uses Rust.
  # Adjust the --manifest-path to your Cargo.toml location.
  #
  # - repo: local
  #   hooks:
  #     - id: cargo-fmt
  #       name: cargo fmt
  #       entry: cargo fmt --manifest-path Cargo.toml --check
  #       language: system
  #       types: [rust]
  #       pass_filenames: false

  # ── Architectural invariants ───────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-invariants
        name: architectural invariants
        entry: ./scripts/check-invariants.sh
        language: system
        pass_filenames: false
        always_run: true

  # ── Conventional commits ───────────────────────────────────────────────────
  # Validates the commit message format on the commit-msg stage.
  # Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci,
  # chore, revert.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - "--strict"
          - "feat"
          - "fix"
          - "docs"
          - "style"
          - "refactor"
          - "perf"
          - "test"
          - "build"
          - "ci"
          - "chore"
          - "revert"
