# progress.app.yaml — MyProject app v1 epic plan
#
# Scope:  apps/web/ + packages/api-client/ — the web frontend and its API layer.
# Spec:   docs/specs/web-spec.md
# Cutoff: thin MVP (web-spec.md §1.3)
#
# ── Conventions ─────────────────────────────────────────────────────────────
# Two agent tracks per epic:
#   - implementation.owner: coder-agent    — writes the code
#   - tests.owner:          tester-agent   — writes and runs the tests
# The two tracks may run in parallel once the epic's contract is fixed.
# An epic is COMPLETE only when:
#   - all implementation.acceptance items pass
#   - all tests.acceptance items pass
#   - the test suite at tests.paths is green
#   - CI gates are green
#
# Status values: planned | in_progress | review | complete | blocked
# depends_on:   list of epic ids that must be complete before this starts
# ────────────────────────────────────────────────────────────────────────────

version: 1
target: app-v1
spec: docs/specs/web-spec.md

phases:
  - id: P0
    name: Foundation
    epics: [APP-01, APP-02]
  - id: P1
    name: Core feature
    epics: [APP-03, APP-04]

epics:

  - id: APP-01
    title: Project skeleton and CI
    area: ci
    status: complete
    review: >
      Implemented 2026-01-10. Package.json, tsconfig, vitest, biome all wired.
      CI green: lint, typecheck, test all pass.
    depends_on: []
    summary: >
      Set up the TypeScript project skeleton with biome for linting/formatting,
      vitest for testing, and the GitHub Actions CI pipeline. This is the
      foundation all other epics build on.
    implementation:
      owner: coder-agent
      paths:
        - package.json
        - tsconfig.json
        - biome.json
        - vite.config.ts
        - .github/workflows/ci.yml
      acceptance:
        - "biome check exits 0 on an empty src/ directory."
        - "vitest runs and reports 0 tests, 0 failures."
        - "CI pipeline runs lint + typecheck + test on push to main."
    tests:
      owner: tester-agent
      paths:
        - tests/smoke/test_ci_smoke.ts
      acceptance:
        - "test_ci_imports: import a trivial src/ export and assert it is defined."

  - id: APP-02
    title: User authentication — login and session
    area: auth
    status: in_progress
    depends_on: [APP-01]
    summary: >
      Implement login (email + password), JWT session token issuance, and the
      /me endpoint. No registration in this epic — users are pre-seeded.
    implementation:
      owner: coder-agent
      paths:
        - src/auth/login.ts
        - src/auth/session.ts
        - src/api/routes/auth.ts
      acceptance:
        - "POST /auth/login with valid credentials returns {token, expiresAt}; token is a valid JWT signed with AUTH_SECRET."
        - "POST /auth/login with invalid password returns 401 with body {error: 'invalid credentials'}."
        - "GET /me with a valid Bearer token returns {id, email}."
        - "GET /me with an expired or missing token returns 401."
    tests:
      owner: tester-agent
      paths:
        - tests/auth/test_login.ts
        - tests/auth/test_session.ts
      acceptance:
        - "test_login_success: POST /auth/login returns 200 with token and expiresAt."
        - "test_login_wrong_password: POST /auth/login returns 401."
        - "test_me_authenticated: GET /me with valid token returns user fields."
        - "test_me_unauthenticated: GET /me with no token returns 401."
        - "test_me_expired_token: GET /me with expired token returns 401."

  - id: APP-03
    title: Dashboard — list and filter items
    area: dashboard
    status: planned
    # agent_mode: single — one agent handles both implement and test-writing.
    # Omit this field (or set to 'split') for the default two-agent model.
    # CLI override: scripts/aw-run --single-agent APP-03
    agent_mode: single
    depends_on: [APP-02]
    summary: >
      Build the main dashboard page that lists items for the authenticated user.
      Supports server-side filtering by status and date range.
    implementation:
      owner: coder-agent
      paths:
        - src/pages/Dashboard.tsx
        - src/api/routes/items.ts
        - src/store/itemsSlice.ts
      acceptance:
        - "GET /items?status=active returns only items where status=active for the authenticated user."
        - "GET /items?from=<iso>&to=<iso> returns items within the date range."
        - "Dashboard page renders a list of items fetched from GET /items."
        - "Each item row displays: title, status badge, created date."
    tests:
      owner: tester-agent
      paths:
        - tests/api/test_items.ts
        - tests/pages/test_dashboard.ts
      acceptance:
        - "test_items_filter_status: filter by status returns only matching items."
        - "test_items_filter_date: filter by date range excludes out-of-range items."
        - "test_dashboard_renders: page mounts without error and shows item list."
        - "test_dashboard_empty: page shows empty-state message when no items."

  - id: APP-04
    title: Item detail — view and edit
    area: detail
    status: planned
    depends_on: [APP-03]
    summary: >
      Detail page for a single item: read-only view plus an inline edit form
      for title and notes. Changes are optimistically applied and persisted via
      PATCH /items/:id.
    implementation:
      owner: coder-agent
      paths:
        - src/pages/ItemDetail.tsx
        - src/api/routes/items.ts    # extend with PATCH handler
      acceptance:
        - "GET /items/:id returns the full item including notes field."
        - "PATCH /items/:id with {title?, notes?} updates and returns the item."
        - "PATCH /items/:id with an unknown id returns 404."
        - "Detail page shows title, status, created date, and notes."
        - "Clicking Edit shows an inline form; Save calls PATCH and updates the view optimistically."
    tests:
      owner: tester-agent
      paths:
        - tests/api/test_item_detail.ts
        - tests/pages/test_item_detail_page.ts
      acceptance:
        - "test_get_item: GET /items/:id returns all fields including notes."
        - "test_patch_item_title: PATCH updates title and returns new value."
        - "test_patch_item_unknown: PATCH unknown id returns 404."
        - "test_detail_page_renders: page mounts and shows all required fields."
        - "test_detail_inline_edit: clicking Edit shows the form; Save calls PATCH."
